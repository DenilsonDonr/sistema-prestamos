<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sistema de Préstamos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />

    <!--
      Script síncrono de auth-gate: corre ANTES del primer paint.
      Si el token existe y no está expirado, añade has-token al <html>
      para que CSS muestre el SPA y oculte el overlay inmediatamente.
      Sin este script el navegador mostraría el SPA un instante antes
      de que el JS asíncrono pueda mostrar el overlay de login.
    -->
    <script>
        (function () {
            try {
                var token = localStorage.getItem('token');
                if (token) {
                    var payload = JSON.parse(atob(token.split('.')[1]));
                    if (payload.exp && payload.exp * 1000 > Date.now()) {
                        document.documentElement.classList.add('has-token');
                    }
                }
            } catch (_) { /* token malformado: lo ignora, mostrará el login */ }
        })();
    </script>
</head>

<body>

    <!-- ══════════════════════════════════════════
       SIDEBAR  (estructura fija, nunca cambia)
  ══════════════════════════════════════════ -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon"><i class="bi bi-cash-coin"></i></div>
            <div>
                <div class="brand-name">PréstamoSys</div>
                <div class="brand-sub">Panel de gestión</div>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section-label">Principal</div>
            <a href="#" class="nav-item active" data-page="dashboard">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Dashboard</span>
            </a>

            <div class="nav-section-label">Administración</div>
            <a href="#" class="nav-item" data-page="usuarios">
                <i class="bi bi-people-fill"></i>
                <span>Usuarios</span>
                <span class="nav-badge" id="badge-usuarios">0</span>
            </a>
            <a href="#" class="nav-item" data-page="herramientas">
                <i class="bi bi-tools"></i>
                <span>Herramientas</span>
                <span class="nav-badge" id="badge-herramientas">0</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="d-flex align-items-center gap-2">
                <div class="avatar-xs"><i class="bi bi-person-fill"></i></div>
                <div class="text-white">
                    <div class="fw-600 text-sm">Administrador</div>
                    <div style="font-size:11px">Sistema v1.0</div>
                </div>
            </div>
        </div>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════ -->
    <main class="main-content" id="mainContent">

        <header class="topbar">
            <button class="btn-toggle-sidebar" id="btnToggleSidebar">
                <i class="bi bi-list"></i>
            </button>
            <div class="topbar-title" id="topbarTitle">Dashboard</div>
            <div class="topbar-actions">
                <div class="status-dot"></div>
                <span class="text-sm text-muted">Conectado</span>
            </div>
        </header>

        <!-- ════════════════════════════════════════
         CONTENEDOR DINÁMICO
         El router inyecta aquí el HTML de cada vista
    ════════════════════════════════════════ -->
        <div class="page-wrapper" id="pageContainer">
            <div class="d-flex justify-content-center align-items-center" style="height:60vh">
                <div class="spinner-custom"></div>
            </div>
        </div>

    </main>

    <!-- ══════════════════════════════════════════
       MODALES GLOBALES (compartidos entre módulos)
  ══════════════════════════════════════════ -->
    <div id="modalsContainer"></div>

    <div class="toast-container" id="toastContainer"></div>

    <!-- ══════════════════════════════════════════
       LOGIN OVERLAY — cubre toda la pantalla cuando
       el usuario no está autenticado. Se muestra/oculta
       en JS sin ninguna recarga de página.
  ══════════════════════════════════════════ -->
    <div id="loginOverlay" class="login-overlay">

        <div class="bg-glow-overlay"></div>

        <div class="login-card">
            <div class="login-brand">
                <div class="login-brand-icon"><i class="bi bi-cash-coin"></i></div>
                <div>
                    <div class="login-brand-name">PréstamoSys</div>
                    <div class="login-brand-sub">Sistema de préstamo de herramientas</div>
                </div>
            </div>

            <div class="login-title">Iniciar sesión</div>
            <div class="login-subtitle">Ingresa tus credenciales para continuar</div>

            <div class="login-alert" id="loginAlert">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="loginAlertMsg"></span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group-login">
                    <label class="login-label" for="loginUsername">Usuario</label>
                    <div class="login-input-wrap">
                        <i class="bi bi-person login-input-icon"></i>
                        <input type="text" id="loginUsername" class="login-input" placeholder="Tu nombre de usuario"
                            maxlength="50" autocomplete="username" />
                    </div>
                    <div class="login-field-error" id="err-loginUsername"></div>
                </div>

                <div class="form-group-login">
                    <label class="login-label" for="loginPassword">Contraseña</label>
                    <div class="login-input-wrap">
                        <i class="bi bi-lock login-input-icon"></i>
                        <input type="password" id="loginPassword" class="login-input" placeholder="Tu contraseña"
                            maxlength="100" autocomplete="current-password" />
                        <button type="button" id="btnTogglePassword" class="login-eye-btn" tabindex="-1">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    <div class="login-field-error" id="err-loginPassword"></div>
                </div>

                <button type="submit" class="btn-login-submit" id="btnLogin">
                    <span id="btnLoginContent"><i class="bi bi-box-arrow-in-right"></i> Ingresar</span>
                    <span id="btnLoginSpinner" class="d-none">
                        <div class="spinner-sm"></div>
                    </span>
                </button>
            </form>

            <div class="login-footer-note">PréstamoSys v1.0 — Uso interno</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Orden de carga: utilidades → login → router → módulos → arranque -->
    <script src="js/utils.js"></script>
    <script src="js/modules/login.js"></script>
    <script src="js/router.js"></script>
    <script src="js/modules/usuarios.js"></script>
    <script src="js/modules/herramientas.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
